// ── カラー定義 ──────────────────────────────────────────────
const C = {
  bg:"#0d0f14", card:"#161920", border:"#252a36",
  accent:"#c8a96e", accentMuted:"#8a7248",
  text:"#e8e2d6", muted:"#7a7a8a", dim:"#4a4a5a",
  green:"#4caf7d",
  cat:{ "国内政治":"#5b8dd9","経済・産業":"#c8a96e","社会・法律":"#7dc8a9","国際情勢":"#d97b5b","科学・環境":"#a97dc8" }
};

// ── コンポーネント ────────────────────────────────────────────
function Badge({ cat }) {
  const color = C.cat[cat] || C.accent;
  return (
    <span style={{ fontSize:10, fontWeight:700, letterSpacing:"0.08em",
      padding:"2px 7px", borderRadius:4, color, border:`1px solid ${color}44`,
      background:`${color}18`, flexShrink:0 }}>
      {cat}
    </span>
  );
}

function ProgressBar({ done, total }) {
  const p = total > 0 ? Math.round(done/total*100) : 0;
  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:C.muted, marginBottom:5 }}>
        <span>進捗</span><span>{done}/{total}問 ({p}%)</span>
      </div>
      <div style={{ height:3, background:C.border, borderRadius:2 }}>
        <div style={{ height:"100%", width:`${p}%`, borderRadius:2,
          background:`linear-gradient(90deg,${C.accentMuted},${C.accent})`,
          transition:"width 0.4s" }} />
      </div>
    </div>
  );
}

function App() {
  const [cat, setCat] = useState("全問");
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [detail, setDetail] = useState(false);
  const [done, setDone] = useState(new Set());
  const [mode, setMode] = useState("study");

  const qs = cat === "全問" ? ALL_QUESTIONS : ALL_QUESTIONS.filter(q => q.cat === cat);
  const cur = qs[Math.min(idx, qs.length-1)];
  const doneCat = qs.filter(q => done.has(q.id)).length;

  const go = useCallback((dir) => {
    setFlipped(false); setDetail(false);
    setIdx(i => (i + dir + qs.length) % qs.length);
  }, [qs.length]);

  const flip = () => {
    if (!flipped) setDone(s => { const n = new Set(s); n.add(cur.id); return n; });
    setFlipped(f => !f); setDetail(false);
  };

  const selectCat = (c) => { setCat(c); setIdx(0); setFlipped(false); setDetail(false); };
  const jumpTo = (i) => { setIdx(i); setFlipped(false); setDetail(false); setMode("study"); };

  // iOS safe area padding
  const safeTop = "env(safe-area-inset-top, 0px)";
  const safeBot = "env(safe-area-inset-bottom, 0px)";

  return (
    <div style={{ minHeight:"100vh", background:C.bg, color:C.text,
      fontFamily:"'Hiragino Mincho ProN','Yu Mincho',Georgia,serif",
      paddingBottom:`calc(40px + ${safeBot})` }}>

      {/* ヘッダー */}
      <div style={{ background:C.card, borderBottom:`1px solid ${C.border}`,
        padding:`calc(16px + ${safeTop}) 20px 14px`, position:"sticky", top:0, zIndex:10 }}>
        <div style={{ fontSize:10, letterSpacing:"0.15em", color:C.accentMuted, fontFamily:"monospace", marginBottom:2 }}>
          特別区経験者採用試験
        </div>
        <div style={{ fontSize:17, fontWeight:700, letterSpacing:"0.03em" }}>時事対策 暗記問題集</div>
        <div style={{ fontSize:10, color:C.dim, marginTop:1 }}>
          令和7年10月 ─ 令和8年5月　全{ALL_QUESTIONS.length}問
        </div>
        <div style={{ display:"flex", gap:8, marginTop:12 }}>
          {["study","list"].map(m => (
            <button key={m} onClick={() => setMode(m)} style={{
              padding:"5px 14px", borderRadius:6, fontSize:12, cursor:"pointer", fontFamily:"inherit",
              border: mode===m ? `1px solid ${C.accent}` : `1px solid ${C.border}`,
              background: mode===m ? `${C.accent}18` : "transparent",
              color: mode===m ? C.accent : C.muted }}>
              {m==="study" ? "カード学習" : "問題一覧"}
            </button>
          ))}
        </div>
      </div>

      {/* カテゴリ */}
      <div style={{ display:"flex", gap:6, padding:"12px 20px", overflowX:"auto",
        borderBottom:`1px solid ${C.border}`, WebkitOverflowScrolling:"touch" }}>
        {["全問","国内政治","経済・産業","社会・法律","国際情勢","科学・環境"].map(c => {
          const color = c==="全問" ? C.accent : (C.cat[c]||C.accent);
          return (
            <button key={c} onClick={() => selectCat(c)} style={{
              flexShrink:0, padding:"5px 12px", borderRadius:20, fontSize:11,
              fontWeight:700, letterSpacing:"0.05em", cursor:"pointer", fontFamily:"inherit",
              border: cat===c ? `1px solid ${color}` : `1px solid ${C.border}`,
              background: cat===c ? `${color}20` : "transparent",
              color: cat===c ? color : C.muted }}>
              {c}
            </button>
          );
        })}
      </div>

      <div style={{ padding:"0 20px" }}>
        <div style={{ paddingTop:16, paddingBottom:4 }}>
          <ProgressBar done={doneCat} total={qs.length} />
        </div>

        {mode==="study" ? (
          <>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", margin:"12px 0" }}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontSize:13, color:C.muted }}>Q{idx+1} / {qs.length}</span>
                <Badge cat={cur.cat} />
              </div>
              <span style={{ fontSize:11, color: done.has(cur.id) ? C.green : C.dim }}>
                {done.has(cur.id) ? "✓ 確認済" : "未確認"}
              </span>
            </div>

            {/* カード本体 */}
            <div onClick={flip} style={{
              background:C.card, borderRadius:12, padding:"24px 20px", cursor:"pointer",
              minHeight:170, border:`1px solid ${flipped ? C.accentMuted : C.border}`,
              transition:"border-color 0.2s", marginBottom:12, userSelect:"none" }}>
              {!flipped ? (
                <>
                  <div style={{ fontSize:10, letterSpacing:"0.12em", color:C.accentMuted,
                    marginBottom:14, fontFamily:"monospace" }}>
                    QUESTION — タップして答えを見る
                  </div>
                  <div style={{ fontSize:15, lineHeight:1.85, fontWeight:600 }}>{cur.q}</div>
                </>
              ) : (
                <>
                  <div style={{ fontSize:10, letterSpacing:"0.12em", color:C.green,
                    marginBottom:14, fontFamily:"monospace" }}>ANSWER</div>
                  <div style={{ fontSize:14, lineHeight:1.9 }}>{cur.a}</div>
                  <div style={{ marginTop:16, paddingTop:14, borderTop:`1px dashed ${C.border}` }}>
                    <button onClick={e => { e.stopPropagation(); setDetail(d => !d); }}
                      style={{ background:"transparent", border:`1px solid ${C.border}`,
                        color:C.muted, fontSize:11, padding:"5px 12px", borderRadius:6,
                        cursor:"pointer", fontFamily:"inherit" }}>
                      {detail ? "解説を閉じる ▲" : "解説を見る ▼"}
                    </button>
                    {detail && (
                      <div style={{ marginTop:12, fontSize:12, lineHeight:1.9, color:C.muted,
                        padding:"14px", background:`${C.bg}cc`, borderRadius:8,
                        border:`1px solid ${C.border}` }}>
                        {cur.detail}
                      </div>
                    )}
                  </div>
                </>
              )}
            </div>

            {/* ナビ */}
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={() => go(-1)} style={{ flex:1, padding:"13px", borderRadius:10,
                border:`1px solid ${C.border}`, background:"transparent", color:C.muted,
                fontSize:14, cursor:"pointer", fontFamily:"inherit" }}>← 前へ</button>
              <button onClick={flip} style={{ flex:2, padding:"13px", borderRadius:10,
                border:`1px solid ${flipped ? C.accentMuted : C.accent}`,
                background:flipped ? `${C.accentMuted}18` : `${C.accent}18`,
                color:flipped ? C.accentMuted : C.accent,
                fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>
                {flipped ? "問題に戻る" : "答えを見る"}
              </button>
              <button onClick={() => go(1)} style={{ flex:1, padding:"13px", borderRadius:10,
                border:`1px solid ${C.border}`, background:"transparent", color:C.muted,
                fontSize:14, cursor:"pointer", fontFamily:"inherit" }}>次へ →</button>
            </div>
          </>
        ) : (
          <div style={{ paddingTop:12 }}>
            <div style={{ fontSize:11, color:C.dim, marginBottom:12 }}>
              問題をタップするとカード学習に移動します
            </div>
            {qs.map((q, i) => (
              <div key={q.id} onClick={() => jumpTo(i)} style={{
                background:C.card, borderRadius:8, padding:"12px 14px", marginBottom:8,
                cursor:"pointer", border:`1px solid ${C.border}`,
                borderLeft:`3px solid ${done.has(q.id) ? C.green : C.border}` }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                  <span style={{ fontSize:10, color:C.dim, fontFamily:"monospace", flexShrink:0 }}>
                    Q{i+1}
                  </span>
                  <Badge cat={q.cat} />
                  {done.has(q.id) && (
                    <span style={{ fontSize:10, color:C.green, marginLeft:"auto", flexShrink:0 }}>
                      ✓ 確認済
                    </span>
                  )}
                </div>
                <div style={{ fontSize:12, color:C.muted, lineHeight:1.65 }}>{q.q}</div>
              </div>
            ))}
          </div>
        )}

        <div style={{ marginTop:24, padding:"12px 14px", borderRadius:8,
          border:`1px solid ${C.border}`, background:C.card,
          fontSize:10, color:C.dim, lineHeight:1.8 }}>
          ※「未確認」と記載のある情報は一次情報による確認が不十分な箇所です。
          試験直前に政府発表や報道で必ず補完してください。
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
